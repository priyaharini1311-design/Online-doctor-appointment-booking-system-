<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Book an Appointment</h1>
</header>

<form>
    <label>Patient Name</label><br>
    <input type="text" placeholder="Enter your name" required><br><br>

    <label>Select Doctor</label><br>
    <select required>
        <option>Select Doctor</option>
        <option>Dr. Anjali Sharma - Cardiologist</option>
        <option>Dr. Rahul Verma - Dermatologist</option>
        <option>Dr. Priya Nair - Pediatrician</option>
    </select><br><br>

    <label>Appointment Date</label><br>
    <input type="date" required><br><br>

    <label>Appointment Time</label><br>
    <input type="time" required><br><br>

    <label>Symptoms</label><br>
    <textarea rows="4" placeholder="Describe your symptoms"></textarea><br><br>

    <button type="submit">Book Appointment</button>
</form>

</body>
</html>
