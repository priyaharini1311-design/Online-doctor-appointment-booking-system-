<body>

<header>

    <div class="logo">
        <i class="fa-solid fa-hospital"></i>
        <h2>LifeCare Hospital</h2>
    </div>

    <nav>

<section class="appointment" style="margin-top:100px;">

<h2>Book Your Appointment</h2>

<form id="appointmentForm">

<input type="text"
id="name"
placeholder="Full Name"
required>

<input type="number"
id="age"
placeholder="Age"
required>

<select id="gender" required>

<option value="">Select Gender</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

<input type="tel"
id="phone"
placeholder="Phone Number"
required>

<input type="email"
id="email"
placeholder="Email Address"
required>

<select id="department" required>

<option value="">Choose Department</option>

<option>Cardiology</option>

<option>Neurology</option>

<option>Orthopedic</option>

<option>Pediatrics</option>

<option>Dermatology</option>

<option>ENT</option>

</select>

<select id="doctor" required>

<option value="">Choose Doctor</option>

<option>Dr. john</option>

<option>Dr. Sarah Wilson</option>

<option>Dr. David Lee</option>

<option>Dr. Priya Kumar</option>

<option>Dr. Rahul Sharma</option>

<option>Dr. sugeshan</option>

</select>

<input type="date"
id="date"
required>

<select id="time" required>

<option value="">Select Time</option>

<option>09:00 AM</option>

<option>10:00 AM</option>

<option>11:00 AM</option>

<option>12:00 PM</option>

<option>02:00 PM</option>

<option>03:00 PM</option>

<option>04:00 PM</option>

</select>

<textarea
id="problem"
rows="5"
placeholder="Describe your symptoms"></textarea>

<button type="submit">

<i class="fa-solid fa-calendar-check"></i>

Book Appointment

</button>

</form>

</section>

<footer>

<p>

© 2026 LifeCare Hospital | All Rights Reserved

</p>

</footer>

<script>

document.getElementById("appointmentForm").addEventListener("submit",function(e){

e.preventDefault();

alert(

"Appointment Booked Successfully!\n\n"

+

"Patient : "

+

document.getElementById("name").value

+

"\nDoctor : "

+

document.getElementById("doctor").value

+

"\nDate : "

+

document.getElementById("date").value

+

"\nTime : "

+

document.getElementById("time").value

);

this.reset();

});

</script>

</body>
  </html>
